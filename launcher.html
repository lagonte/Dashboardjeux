<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DashboardJeux</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #1a1c20;
    --card:    #23262b;
    --border:  #2e3138;
    --text:    #e8eaed;
    --muted:   #7a7d85;
    --accent:  #4f8ef7;
    --green:   #2dc653;
    --red:     #e63946;
    --orange:  #f4a261;
    --radius:  10px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    user-select: none;
    -webkit-app-region: drag;
  }

  /* Logo */
  .launcher-logo {
    width: 56px;
    height: 56px;
    filter: drop-shadow(0 0 10px rgba(79,142,247,.5));
  }
  .launcher-logo path:last-child { fill: #1a1c20; }

  /* Drag handle at top */
  .drag-bar {
    height: 32px;
    -webkit-app-region: drag;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 0 12px;
  }
  .drag-bar button {
    -webkit-app-region: no-drag;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 18px;
    cursor: pointer;
    padding: 4px;
    border-radius: 6px;
    transition: color .15s, background .15s;
  }
  .drag-bar button:hover { color: var(--text); background: var(--card); }

  .content {
    -webkit-app-region: no-drag;
    padding: 0 28px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  /* Header */
  .header {
    text-align: center;
  }
  .header h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: .02em;
    color: var(--text);
  }
  .header p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* Status */
  .status-block {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 24px;
    width: 100%;
    text-align: center;
  }
  .status-label {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: .04em;
    transition: color .3s;
  }
  .status-label.running { color: var(--green); }
  .status-label.starting { color: var(--orange); }
  .status-label.stopped, .status-label.error { color: var(--red); }

  .status-url {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
    font-family: "SF Mono", "Fira Code", monospace;
  }

  /* Port row */
  .port-row {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .port-row label {
    font-size: 12px;
    color: var(--muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .06em;
    flex: 1;
  }
  .port-row input {
    width: 72px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 8px;
    color: var(--text);
    font-size: 13px;
    font-family: "SF Mono", "Fira Code", monospace;
    outline: none;
    text-align: center;
    transition: border-color .15s;
  }
  .port-row input:focus { border-color: var(--accent); }
  .btn-small {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 12px;
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .btn-small:hover { border-color: var(--accent); color: var(--accent); }

  .port-note {
    font-size: 11px;
    color: var(--orange);
    margin-top: -12px;
    text-align: center;
    display: none;
  }

  /* Action buttons */
  .actions {
    width: 100%;
    display: flex;
    gap: 10px;
  }
  .btn {
    flex: 1;
    padding: 11px 10px;
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all .15s;
    text-align: center;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .btn.primary:hover { opacity: .85; }
  .btn.primary:disabled { opacity: .4; cursor: not-allowed; }
  .btn.danger:hover { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>

<div class="drag-bar">
  <button title="Paramètres" onclick="toggleSettings()">⚙</button>
</div>

<div class="content">

    <h1>DashboardJeux</h1>
    <p>AutoCutter Studio Control</p>
  </div>

  <div class="status-block">
    <div class="status-label starting" id="statusLabel">Démarrage…</div>
    <div class="status-url" id="statusUrl">http://localhost:3000</div>
  </div>

  <div class="port-row" id="portRow" style="display:none">
    <label>Port</label>
    <input type="number" id="portInput" min="1024" max="65535">
    <button class="btn-small" onclick="changePort()">Changer</button>
  </div>
  <div class="port-note" id="portNote">Redémarrez pour appliquer le nouveau port.</div>

  <div class="actions">
    <button class="btn primary" id="btnGui" onclick="launchGui()" disabled>Ouvrir GUI</button>
    <button class="btn" onclick="hide()">Masquer</button>
    <button class="btn danger" onclick="quit()">Quitter</button>
  </div>

</div>

<script>
const { ipcRenderer } = require("electron");

let settingsVisible = false;
let currentStatus = "starting";

function toggleSettings() {
  settingsVisible = !settingsVisible;
  document.getElementById("portRow").style.display = settingsVisible ? "flex" : "none";
  document.getElementById("portNote").style.display = "none";
}

function updateUI({ status, port }) {
  currentStatus = status;
  const label = document.getElementById("statusLabel");
  const urlEl = document.getElementById("statusUrl");
  const btnGui = document.getElementById("btnGui");
  const portInput = document.getElementById("portInput");

  const labels = { running: "Running", starting: "Démarrage…", stopped: "Arrêté", error: "Erreur" };
  label.textContent = labels[status] || status;
  label.className = "status-label " + status;

  urlEl.textContent = `http://localhost:${port}`;
  portInput.value = port;

  btnGui.disabled = status !== "running";
}

async function init() {
  const state = await ipcRenderer.invoke("get-state");
  updateUI(state);
}

ipcRenderer.on("status-update", (_, data) => updateUI(data));

async function launchGui() {
  await ipcRenderer.invoke("launch-gui");
}

async function changePort() {
  const val = document.getElementById("portInput").value;
  const result = await ipcRenderer.invoke("change-port", val);
  if (result.ok) {
    document.getElementById("portNote").style.display = "block";
    document.getElementById("portNote").textContent = "Port sauvegardé. Redémarrez pour appliquer.";
  } else {
    document.getElementById("portNote").style.display = "block";
    document.getElementById("portNote").style.color = "var(--red)";
    document.getElementById("portNote").textContent = result.error;
  }
}

function hide() { ipcRenderer.invoke("hide"); }
function quit() { ipcRenderer.invoke("quit"); }

init();
</script>
</body>
</html>
