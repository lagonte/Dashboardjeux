<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pilotage studios</title>
  <style>
    :root{
      --bg:#06122b;
      --panel:#0d1734;
      --panel2:#111b3e;
      --line:rgba(255,255,255,.08);
      --blue:#2f6df6;
      --green:#22c55e;
      --red:#ef4444;
      --text:#f5f7ff;
      --muted:rgba(255,255,255,.55);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color:var(--text);
      background:radial-gradient(circle at top, #0b204d 0%, #05122d 45%, #020916 100%);
      min-height:100vh;
    }

    .wrap{ padding:16px 20px 28px; }

    /* ---- Topbar ---- */
    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
    }

    .clock{
      font-size:28px;
      color:#fff;
      font-weight:900;
    }

    /* ---- Tabs ---- */
    .tabs{ display:flex; gap:6px; }

    .tab{
      background:rgba(255,255,255,.06);
      color:var(--muted);
      border:1px solid rgba(255,255,255,.08);
      border-radius:12px;
      padding:9px 22px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      min-height:unset;
      transition:.15s;
    }

    .tab:hover{ background:rgba(255,255,255,.1); color:#fff; }
    .tab.active{ background:var(--blue); color:#fff; border-color:var(--blue); }

    /* ---- Pilotage grid ---- */
    .grid{
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:18px;
    }

    .studio-btn{
      position:relative;
      min-height:160px;
      border-radius:26px;
      border:2px solid rgba(255,255,255,.09);
      background:rgba(255,255,255,.03);
      box-shadow:0 10px 30px rgba(0,0,0,.25);
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:18px;
      cursor:pointer;
      transition:.15s ease;
      user-select:none;
    }

    .studio-btn:hover{ transform:translateY(-1px); }

    .studio-btn.free{
      border-color:rgba(47,109,246,.95);
      background:rgba(47,109,246,.10);
    }

    .studio-btn.busy{
      border-color:rgba(255,255,255,.08);
      background:rgba(255,255,255,.05);
      cursor:not-allowed;
      opacity:.72;
    }

    .studio-dot{
      position:absolute;
      top:14px; right:14px;
      width:12px; height:12px;
      border-radius:999px;
      background:rgba(255,255,255,.1);
    }

    .studio-btn.free .studio-dot{ background:var(--blue); }
    .studio-btn.busy .studio-dot{ background:#2a2a2a; }

    .studio-number{
      font-size:58px;
      line-height:1;
      font-weight:900;
      color:var(--blue);
      margin-bottom:8px;
    }

    .studio-title{
      font-size:17px;
      text-transform:uppercase;
      letter-spacing:.04em;
      color:var(--muted);
      font-weight:700;
    }

    .studio-status{
      margin-top:12px;
      font-size:15px;
      font-weight:800;
      color:var(--green);
      min-height:22px;
    }

    /* ---- Config tab ---- */
    .config-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
    }

    .config-title{ font-size:22px; font-weight:800; }

    .studio-config-card{
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:16px 20px;
      display:flex;
      align-items:center;
      gap:16px;
      margin-bottom:12px;
      transition:.15s;
    }

    .studio-config-card:hover{ border-color:rgba(255,255,255,.15); }

    .studio-config-order{
      display:flex;
      flex-direction:column;
      gap:4px;
      flex-shrink:0;
    }

    .studio-config-main{ flex:1; min-width:0; }

    .studio-config-name{
      font-size:17px;
      font-weight:700;
      margin-bottom:5px;
    }

    .studio-config-name span{
      color:var(--blue);
      margin-right:6px;
    }

    .studio-config-meta{
      font-size:13px;
      color:var(--muted);
      display:flex;
      flex-wrap:wrap;
      gap:12px;
    }

    .meta-chip{
      background:rgba(255,255,255,.06);
      border-radius:6px;
      padding:2px 8px;
      font-family:monospace;
      font-size:12px;
    }

    .studio-config-actions{
      display:flex;
      gap:8px;
      flex-shrink:0;
    }

    .btn-icon{
      background:rgba(255,255,255,.08);
      color:#fff;
      border-radius:10px;
      width:38px; height:38px;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      font-size:16px;
      min-height:unset;
      padding:0;
      transition:.15s;
      border:0;
    }

    .btn-icon:hover{ background:rgba(255,255,255,.16); }
    .btn-icon.danger:hover{ background:rgba(239,68,68,.3); }

    .empty-config{
      text-align:center;
      color:var(--muted);
      padding:48px 0;
      font-size:16px;
    }

    /* ---- Overlays & modals ---- */
    .overlay{
      position:fixed;
      inset:0;
      background:rgba(1,6,15,.75);
      display:none;
      align-items:center;
      justify-content:center;
      padding:20px;
      z-index:999;
    }

    .overlay.open{ display:flex; }

    .modal{
      width:min(520px, 100%);
      background:linear-gradient(180deg, #101b3d, #0b1532);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:0 20px 50px rgba(0,0,0,.35);
      padding:22px;
      max-height:90vh;
      overflow-y:auto;
    }

    .modal h2{ margin:0 0 8px; font-size:28px; }
    .modal p{ margin:0 0 16px; color:var(--muted); }

    /* ---- Fields ---- */
    .field{ margin-bottom:14px; }

    .field label{
      display:block;
      margin-bottom:7px;
      font-weight:700;
      font-size:14px;
    }

    .field input,
    .field select{
      width:100%;
      border:1px solid var(--line);
      border-radius:16px;
      padding:15px 14px;
      font-size:18px;
      color:#fff;
      background:#081126;
      outline:none;
    }

    .field input:focus,
    .field select:focus{
      border-color:rgba(47,109,246,.85);
      box-shadow:0 0 0 4px rgba(47,109,246,.16);
    }

    .field input:disabled{
      opacity:.5;
      cursor:not-allowed;
    }

    .field-row{
      display:grid;
      grid-template-columns:1fr 1fr 1fr;
      gap:10px;
    }

    .field-row-2{
      display:grid;
      grid-template-columns:1fr 2fr;
      gap:10px;
    }

    .field-sub label{
      display:block;
      font-size:12px;
      color:var(--muted);
      font-weight:600;
      margin-bottom:6px;
    }

    .field-sub input{
      width:100%;
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px 10px;
      font-size:16px;
      color:#fff;
      background:#081126;
      outline:none;
    }

    .field-sub input:focus{
      border-color:rgba(47,109,246,.85);
      box-shadow:0 0 0 3px rgba(47,109,246,.16);
    }

    .error{ min-height:18px; margin-top:6px; color:#ff9f9f; font-size:13px; }

    /* ---- Advanced toggle ---- */
    .advanced-toggle{
      background:none;
      border:1px solid rgba(255,255,255,.1);
      color:var(--muted);
      font-size:13px;
      font-weight:600;
      border-radius:10px;
      padding:9px 14px;
      cursor:pointer;
      min-height:unset;
      width:100%;
      margin-bottom:12px;
      text-align:left;
      transition:.15s;
    }

    .advanced-toggle:hover{ border-color:rgba(255,255,255,.22); color:#fff; }
    .advanced-section{ display:none; }
    .advanced-section.open{ display:block; }

    /* ---- Statut inconnu (Companion hors ligne) ---- */
    .studio-btn.unknown{
      border-color:rgba(251,146,60,.5);
      background:rgba(251,146,60,.06);
      cursor:not-allowed;
      opacity:.80;
    }
    .studio-btn.unknown .studio-dot{ background:#f97316; }
    .studio-btn.unknown .studio-status{ color:#fb923c; }

    /* ---- Companion card (onglet config) ---- */
    .companion-card{
      background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:16px 20px;
      margin-bottom:20px;
    }
    .companion-card-header{
      display:flex;
      align-items:center;
      gap:12px;
    }
    .companion-card-label{
      font-size:12px;
      font-weight:700;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.07em;
      flex-shrink:0;
    }
    .companion-url-row{
      display:flex;
      align-items:center;
      gap:8px;
      flex:1;
      min-width:0;
    }
    .companion-url-text{
      font-family:monospace;
      font-size:15px;
      color:#fff;
      flex:1;
      min-width:0;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }
    .companion-ping{
      font-size:12px;
      font-weight:700;
      padding:3px 10px;
      border-radius:20px;
      flex-shrink:0;
      min-width:60px;
      text-align:center;
    }
    .companion-ping.ok{ background:rgba(34,197,94,.15); color:var(--green); }
    .companion-ping.ko{ background:rgba(239,68,68,.15); color:var(--red); }
    .companion-edit-row{
      margin-top:12px;
      display:flex;
      gap:8px;
      align-items:center;
    }
    .companion-edit-row input{
      flex:1;
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px 14px;
      font-size:15px;
      color:#fff;
      background:#081126;
      outline:none;
      font-family:monospace;
    }
    .companion-edit-row input:focus{
      border-color:rgba(47,109,246,.85);
      box-shadow:0 0 0 3px rgba(47,109,246,.16);
    }

    /* ---- Buttons ---- */
    button{
      border:0;
      border-radius:16px;
      min-height:56px;
      padding:14px 18px;
      font-size:18px;
      font-weight:800;
      cursor:pointer;
    }

    .btn-secondary{ background:#243255; color:#fff; flex:1; }
    .btn-primary{ background:var(--blue); color:#fff; flex:1; }
    .btn-sm{ min-height:42px; padding:10px 18px; font-size:15px; flex:none; }

    button:disabled{ opacity:.45; cursor:not-allowed; }

    .row{ display:flex; gap:12px; margin-top:12px; }

    /* ---- License screen ---- */
    .license-screen{
      min-height:100vh;
      display:none;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .license-screen.open{ display:flex; }

    .license-box{
      width:min(520px,100%);
      background:linear-gradient(180deg,#101b3d,#0b1532);
      border:1px solid var(--line);
      border-radius:24px;
      padding:24px;
    }

    .license-box h1{ margin:0 0 10px; font-size:30px; }
    .license-box p{ color:var(--muted); margin:0 0 16px; }

    .license-box input{
      width:100%;
      border:1px solid var(--line);
      border-radius:16px;
      padding:16px;
      font-size:18px;
      color:#fff;
      background:#081126;
      outline:none;
      margin-bottom:12px;
    }

    .hint{ color:var(--muted); font-size:13px; margin-top:8px; min-height:18px; }


    /* ---- Sélecteur de jeu (modal lancement) ---- */
    .game-choice-btn{
      display:block;
      width:100%;
      background:rgba(47,109,246,.10);
      border:1px solid rgba(47,109,246,.28);
      border-radius:14px;
      padding:16px 20px;
      font-size:17px;
      font-weight:700;
      color:#fff;
      text-align:left;
      margin-bottom:10px;
      min-height:unset;
      cursor:pointer;
      transition:.15s;
    }
    .game-choice-btn:hover{ background:rgba(47,109,246,.25); border-color:rgba(47,109,246,.55); }

    /* ---- Éditeur de jeux (modal config) ---- */
    .ge-buttons{ margin-top:6px; padding-left:10px; border-left:2px solid rgba(255,255,255,.08); }
    .ge-btn-entry{
      display:flex;
      gap:6px;
      align-items:center;
      margin-bottom:6px;
    }
    .ge-url{
      flex:1;
      border:1px solid var(--line);
      border-radius:8px;
      padding:8px 10px;
      font-size:12px;
      color:#fff;
      background:#081126;
      outline:none;
      font-family:monospace;
      min-width:0;
    }
    .ge-url:focus{ border-color:rgba(47,109,246,.85); }
    .ge-add-btn-companion{
      background:rgba(255,255,255,.06);
      color:var(--muted);
      border:1px dashed rgba(255,255,255,.15);
      border-radius:8px;
      padding:6px 12px;
      font-size:12px;
      font-weight:700;
      cursor:pointer;
      min-height:unset;
      margin-top:4px;
      transition:.15s;
      width:100%;
    }
    .ge-add-btn-companion:hover{ color:#fff; border-color:rgba(255,255,255,.3); }
    .game-entry{
      background:rgba(255,255,255,.04);
      border-radius:12px;
      padding:10px 12px;
      margin-bottom:8px;
    }
    .ge-name{
      flex:1;
      border:1px solid var(--line);
      border-radius:10px;
      padding:10px 12px;
      font-size:14px;
      color:#fff;
      background:#081126;
      outline:none;
      min-width:0;
    }
    .ge-name:focus{ border-color:rgba(47,109,246,.85); }
    .ge-btn-group{ display:flex; gap:4px; }
    .ge-num-field{ display:flex; flex-direction:column; align-items:center; gap:2px; }
    .ge-num-field label{ font-size:10px; color:var(--muted); font-weight:700; }
    .ge-num-field input{
      width:48px;
      border:1px solid var(--line);
      border-radius:8px;
      padding:8px 4px;
      font-size:13px;
      color:#fff;
      background:#081126;
      outline:none;
      text-align:center;
    }
    .ge-num-field input:focus{ border-color:rgba(47,109,246,.85); }
    /* ---- Logo + footer ---- */
    .logo-autocutter{ height:34px; width:auto; display:block; }
    .topbar-left{ display:flex; align-items:center; gap:14px; }
    .app-footer{
      text-align:center;
      color:rgba(255,255,255,.22);
      font-size:12px;
      padding:24px 0 8px;
      letter-spacing:.03em;
    }

    @media (max-width:1100px){ .grid{ grid-template-columns:repeat(2, minmax(0,1fr)); } }
    @media (max-width:720px){
      .grid{ grid-template-columns:1fr; }
      .clock{ font-size:24px; }
      .field-row{ grid-template-columns:1fr; }
      .field-row-2{ grid-template-columns:1fr; }
    }
  /* ---- Splash screen ---- */
  #splash{
    position:fixed;
    inset:0;
    background:radial-gradient(circle at top, #0b204d 0%, #05122d 45%, #020916 100%);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:28px;
    z-index:9999;
    transition:opacity .5s ease;
  }
  #splash.fade-out{ opacity:0; pointer-events:none; }
  .splash-logo{
    width:100px;
    animation:splash-pulse 1.8s ease-in-out infinite;
    filter:drop-shadow(0 0 18px rgba(47,109,246,.6));
  }
  .splash-logo path:last-child { fill: #06122b; }
  .logo-autocutter path:last-child { fill: #0d1734; }
  @keyframes splash-pulse{
    0%,100%{ transform:scale(1);   filter:drop-shadow(0 0 12px rgba(47,109,246,.4)); }
    50%    { transform:scale(1.08); filter:drop-shadow(0 0 28px rgba(47,109,246,.85)); }
  }
  .splash-dots{
    display:flex; gap:10px;
  }
  .splash-dot{
    width:8px; height:8px; border-radius:50%;
    background:rgba(47,109,246,.4);
    animation:dot-bounce .9s ease-in-out infinite;
  }
  .splash-dot:nth-child(2){ animation-delay:.15s; }
  .splash-dot:nth-child(3){ animation-delay:.3s; }
  @keyframes dot-bounce{
    0%,100%{ background:rgba(47,109,246,.3); transform:translateY(0); }
    50%    { background:rgba(47,109,246,1);  transform:translateY(-6px); }
  }
  </style>
</head>

  <script>
    /* ============================================================
       ÉTAT
    ============================================================ */
    const state = {
      studios: [],
      selectedStudio: null,
      selectedGameIndex: -1,
      submitting: false
    };

    const cfgState = {
      studios: [],
      editingId: null,
      editingGames: []
    };

    /* ============================================================
       ÉLÉMENTS DOM
    ============================================================ */
    const els = {
      appRoot:         document.getElementById("appRoot"),
      licenseScreen:   document.getElementById("licenseScreen"),
      licenseKeyInput: document.getElementById("licenseKeyInput"),
      activateBtn:     document.getElementById("activateBtn"),
      licenseHint:     document.getElementById("licenseHint"),
      clock:           document.getElementById("clock"),
      grid:            document.getElementById("grid"),
      overlay:         document.getElementById("overlay"),
      modalTitle:      document.getElementById("modalTitle"),
      modalSubtitle:   document.getElementById("modalSubtitle"),
      nameInput:       document.getElementById("nameInput"),
      phoneInput:      document.getElementById("phoneInput"),
      countrySelect:   document.getElementById("countrySelect"),
      emailInput:      document.getElementById("emailInput"),
      nameError:       document.getElementById("nameError"),
      phoneError:      document.getElementById("phoneError"),
      emailError:      document.getElementById("emailError"),
      launchBtn:       document.getElementById("launchBtn"),
      cancelBtn:       document.getElementById("cancelBtn"),
      modalHint:       document.getElementById("modalHint")
    };

    /* ============================================================
       UTILS
    ============================================================ */
    function normalizePhone(phone) {
      let p = String(phone || "").replace(/[^\d+]/g, "").trim();
      const cc = els.countrySelect?.value || "+33";
      if (!p) return "";
      if (p.startsWith("+")) return p;
      if (p.startsWith("00")) return "+" + p.slice(2);
      if (p.startsWith("0")) return cc + p.slice(1);
      return cc + p;
    }

    function validName(n)  { return String(n||"").trim().length >= 2; }
    function validPhone(p) { return /^\+\d{8,15}$/.test(normalizePhone(p)); }
    function validEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(e||"").trim()); }

    function escapeHtml(str) {
      return String(str||"")
        .replaceAll("&","&amp;").replaceAll("<","&lt;")
        .replaceAll(">","&gt;").replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    async function api(url, options = {}) {
      const res  = await fetch(url, { headers:{"Content-Type":"application/json"}, ...options });
      const text = await res.text();
      let data = {};
      try { data = text ? JSON.parse(text) : {}; } catch { data = { raw: text }; }
      if (!res.ok) throw new Error(data.error || data.raw || `HTTP ${res.status}`);
      return data;
    }

    /* ============================================================
       HORLOGE
    ============================================================ */
    function updateClock() {
      els.clock.textContent = new Date().toLocaleTimeString("fr-FR");
    }

    /* ============================================================
       ONGLETS
    ============================================================ */
    document.querySelectorAll(".tab").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        const tab = btn.dataset.tab;
        document.getElementById("tab-pilotage").style.display = tab === "pilotage" ? "block" : "none";
        document.getElementById("tab-config").style.display   = tab === "config"   ? "block" : "none";
        if (tab === "config")   loadConfig().catch(() => {});
        if (tab === "pilotage") loadStudios().catch(() => {});
      });
    });

    /* ============================================================
       LICENCE
    ============================================================ */
    function hideSplash() {
      const splash = document.getElementById("splash");
      if (!splash) return;
      splash.classList.add("fade-out");
      setTimeout(() => splash.remove(), 500);
    }

    async function checkLicense() {
      try {
        const status = await api("/api/license/status");
        hideSplash();
        if (status.valid) {
          els.licenseScreen.classList.remove("open");
          els.appRoot.style.display = "block";
          els.licenseHint.textContent = "";
          await loadStudios();
          return;
        }
        els.appRoot.style.display = "none";
        els.licenseScreen.classList.add("open");
        els.licenseHint.textContent = "Licence invalide ou non activée.";
      } catch (error) {
        hideSplash();
        els.appRoot.style.display = "none";
        els.licenseScreen.classList.add("open");
        els.licenseHint.textContent = error.message || "Erreur de connexion";
      }
    }

    async function activateLicense() {
      const key = els.licenseKeyInput.value.trim();
      if (!key) { els.licenseHint.textContent = "Entrez une clé licence."; return; }
      els.licenseHint.textContent = "Activation...";
      try {
        await api("/api/license/activate", { method:"POST", body:JSON.stringify({ licenseKey:key }) });
        els.licenseScreen.classList.remove("open");
        els.appRoot.style.display = "block";
        els.licenseHint.textContent = "";
        await loadStudios();
      } catch (error) {
        els.licenseHint.textContent = error.message || "Activation impossible";
      }
    }

    /* ============================================================
       PILOTAGE
    ============================================================ */
    function renderStudios() {
      els.grid.innerHTML = state.studios.map(studio => {
        const busy    = studio.status === "busy";
        const unknown = studio.status === "unknown";
        const cls     = busy ? "busy" : unknown ? "unknown" : "free";
        const statusText = busy ? "Indisponible" : unknown ? "Companion hors ligne" : "Disponible";
        const games = studio.games || [];
        const gameTitle = games.length === 0 ? "" :
          games.length === 1 ? escapeHtml(games[0].name) :
          escapeHtml(games[0].name) + ` <span style="color:var(--muted);font-size:12px">(+${games.length - 1})</span>`;
        return `
          <div class="studio-btn ${cls}" data-id="${studio.id}">
            <div class="studio-dot"></div>
            <div class="studio-number">${escapeHtml(studio.label)}</div>
            <div class="studio-title">${gameTitle}</div>
            <div class="studio-status">${statusText}</div>
          </div>`;
      }).join("");
    }

    async function loadStudios() {
      const data = await api("/api/studios");
      state.studios = Array.isArray(data.studios) ? data.studios : [];
      renderStudios();
    }

    /* ---- Modal lancement ---- */
    function openModal(studio) {
      state.selectedStudio = studio;
      state.selectedGameIndex = -1;
      state.submitting = false;
      els.nameInput.value     = "";
      els.phoneInput.value    = "";
      els.countrySelect.value = "+33";
      els.emailInput.value    = "";
      els.modalHint.textContent = "";

      const games = studio.games || [];
      if (games.length <= 1) {
        // Jeu unique : aller directement au formulaire
        state.selectedGameIndex = 0;
        document.getElementById("gamePickerSection").style.display = "none";
        document.getElementById("contactFormSection").style.display = "block";
        els.launchBtn.style.display = "";
        els.modalTitle.textContent    = `Lancer studio ${studio.label}`;
        els.modalSubtitle.textContent = games[0]?.name || "";
        validateForm();
        els.overlay.classList.add("open");
        els.nameInput.focus();
      } else {
        // Multi-jeux : afficher le sélecteur
        document.getElementById("gamePickerSection").style.display = "block";
        document.getElementById("contactFormSection").style.display = "none";
        els.launchBtn.style.display = "none";
        els.modalTitle.textContent    = `Studio ${studio.label}`;
        els.modalSubtitle.textContent = "Choisissez un jeu :";
        document.getElementById("gamePickerList").innerHTML =
          games.map((g, i) => `<button class="game-choice-btn" data-game-idx="${i}">${escapeHtml(g.name)}</button>`).join("");
        els.overlay.classList.add("open");
      }
    }

    function closeModal() {
      els.overlay.classList.remove("open");
      state.selectedStudio = null;
    }

    function validateForm() {
      const nameOk  = validName(els.nameInput.value);
      const phoneOk = validPhone(els.phoneInput.value);
      const emailOk = validEmail(els.emailInput.value);
      els.nameError.textContent  = nameOk  || !els.nameInput.value  ? "" : "Nom requis";
      els.phoneError.textContent = phoneOk || !els.phoneInput.value ? "" : "Numéro invalide";
      els.emailError.textContent = emailOk || !els.emailInput.value ? "" : "Email invalide";
      els.launchBtn.disabled = !(nameOk && phoneOk && emailOk) || state.submitting;
    }

    async function launchSelectedStudio() {
      if (!state.selectedStudio || state.submitting) return;
      state.submitting = true;
      validateForm();
      els.modalHint.textContent = "Lancement en cours...";
      try {
        await api(`/api/studios/${state.selectedStudio.id}/launch`, {
          method:"POST",
          body: JSON.stringify({
            name:        els.nameInput.value.trim(),
            phone:       els.phoneInput.value.trim(),
            countryCode: els.countrySelect.value,
            email:       els.emailInput.value.trim(),
            gameIndex:   state.selectedGameIndex
          })
        });
        els.modalHint.textContent = "Studio lancé.";
        await loadStudios();
        closeModal();
      } catch (error) {
        state.submitting = false;
        validateForm();
        els.modalHint.textContent = error.message || "Lancement impossible";
      }
    }

    els.grid.addEventListener("click", e => {
      const tile = e.target.closest("[data-id]");
      if (!tile) return;
      const studio = state.studios.find(s => s.id === tile.dataset.id);
      if (!studio || studio.status === "busy" || studio.status === "unknown") return;
      openModal(studio);
    });

    document.getElementById("gamePickerList").addEventListener("click", e => {
      const btn = e.target.closest("[data-game-idx]");
      if (!btn) return;
      const idx = parseInt(btn.dataset.gameIdx);
      const game = (state.selectedStudio?.games || [])[idx];
      if (!game) return;
      state.selectedGameIndex = idx;
      document.getElementById("gamePickerSection").style.display = "none";
      document.getElementById("contactFormSection").style.display = "block";
      els.launchBtn.style.display = "";
      els.modalTitle.textContent    = `Lancer studio ${state.selectedStudio.label}`;
      els.modalSubtitle.textContent = game.name;
      validateForm();
      els.nameInput.focus();
    });

    els.cancelBtn.addEventListener("click", closeModal);
    els.overlay.addEventListener("click", e => { if (e.target === els.overlay) closeModal(); });

    [els.nameInput, els.phoneInput, els.emailInput, els.countrySelect].forEach(el => {
      el.addEventListener("input", validateForm);
      el.addEventListener("change", validateForm);
    });

    els.phoneInput.addEventListener("blur", () => {
      if (els.phoneInput.value.trim()) {
        els.phoneInput.value = normalizePhone(els.phoneInput.value);
        validateForm();
      }
    });

    els.launchBtn.addEventListener("click", launchSelectedStudio);
    els.activateBtn.addEventListener("click", activateLicense);

    /* ============================================================
       CONFIGURATION
    ============================================================ */
    function renderStudioList() {
      const list = document.getElementById("studioList");
      if (!cfgState.studios.length) {
        list.innerHTML = '<div class="empty-config">Aucun studio configuré.<br>Cliquez sur <strong>+ Ajouter un studio</strong> pour commencer.</div>';
        return;
      }
      list.innerHTML = cfgState.studios.map((s, i) => {
        const games = s.games || [];
        const titleName = games.length === 1 ? escapeHtml(games[0].name) : `${games.length} jeu(x)`;
        const gamesChips = games.map(g => {
          const btns = Array.isArray(g.launchButton) ? g.launchButton : [g.launchButton];
          const btnText = btns.map(b => `P${b?.page}·R${b?.row}·C${b?.column}${b?.companionUrl ? ' (' + b.companionUrl.replace('http://','') + ')' : ''}`).join(' + ');
          return `<span class="meta-chip">${escapeHtml(g.name)} · ${btnText}</span>`;
        }).join("");
        return `
        <div class="studio-config-card">
          <div class="studio-config-order">
            <button class="btn-icon" data-move="${i}" data-dir="-1" title="Monter" ${i === 0 ? "disabled style='opacity:.3'" : ""}>▲</button>
            <button class="btn-icon" data-move="${i}" data-dir="1"  title="Descendre" ${i === cfgState.studios.length - 1 ? "disabled style='opacity:.3'" : ""}>▼</button>
          </div>
          <div class="studio-config-main">
            <div class="studio-config-name">
              <span>${escapeHtml(s.label)}</span>${titleName}
            </div>
            <div class="studio-config-meta">
              <span class="meta-chip">REC: ${escapeHtml(s.recVar)}</span>
              ${gamesChips}
              <span class="meta-chip">ID: ${escapeHtml(s.id)}</span>
            </div>
          </div>
          <div class="studio-config-actions">
            <button class="btn-icon" data-edit="${s.id}" title="Modifier">✏️</button>
            <button class="btn-icon danger" data-delete="${s.id}" title="Supprimer">🗑️</button>
          </div>
        </div>`;
      }).join("");
    }

    document.getElementById("studioList").addEventListener("click", async e => {
      const editBtn   = e.target.closest("[data-edit]");
      const deleteBtn = e.target.closest("[data-delete]");
      const moveBtn   = e.target.closest("[data-move]");

      if (editBtn)   openConfigModal(editBtn.dataset.edit);
      if (deleteBtn) await deleteStudio(deleteBtn.dataset.delete);
      if (moveBtn)   await moveStudio(parseInt(moveBtn.dataset.move), parseInt(moveBtn.dataset.dir));
    });

    async function loadConfig() {
      const [cfgData, urlData] = await Promise.all([
        api("/api/admin/config"),
        api("/api/admin/companion-url")
      ]);
      cfgState.studios = cfgData.studios || [];
      cfgState.companionUrl = urlData.url || "";
      document.getElementById("companionUrlText").textContent  = cfgState.companionUrl;
      document.getElementById("companionUrlInput").value       = cfgState.companionUrl;
      document.getElementById("companionPing").textContent     = "";
      document.getElementById("companionPing").className       = "companion-ping";
      renderStudioList();
    }

    async function saveConfig() {
      await api("/api/admin/config", {
        method: "POST",
        body:   JSON.stringify({ studios: cfgState.studios })
      });
      renderStudioList();
    }

    async function deleteStudio(id) {
      if (!confirm(`Supprimer le studio "${id}" ?`)) return;
      cfgState.studios = cfgState.studios.filter(s => s.id !== id);
      await saveConfig();
    }

    async function moveStudio(index, dir) {
      const newIndex = index + dir;
      if (newIndex < 0 || newIndex >= cfgState.studios.length) return;
      const arr = [...cfgState.studios];
      [arr[index], arr[newIndex]] = [arr[newIndex], arr[index]];
      cfgState.studios = arr;
      await saveConfig();
    }

    /* ---- Modal config ---- */
    function renderBtnEntry(gameIdx, btnIdx, btn) {
      return `<div class="ge-btn-entry" data-game-idx="${gameIdx}" data-btn-idx="${btnIdx}">
        <input class="ge-url" type="text" placeholder="URL Companion (vide = global)" value="${escapeHtml(btn.companionUrl || '')}" />
        <div class="ge-btn-group">
          <div class="ge-num-field"><label>P</label><input class="ge-page" type="number" min="0" value="${btn.page}" /></div>
          <div class="ge-num-field"><label>R</label><input class="ge-rownum" type="number" min="0" value="${btn.row}" /></div>
          <div class="ge-num-field"><label>C</label><input class="ge-col" type="number" min="0" value="${btn.column}" /></div>
        </div>
        <button class="btn-icon danger" data-del-btn data-game-idx="${gameIdx}" data-btn-idx="${btnIdx}" title="Supprimer ce bouton">🗑️</button>
      </div>`;
    }

    function renderCfgGames() {
      const list = document.getElementById("cfgGamesList");
      if (!cfgState.editingGames.length) {
        list.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:6px 0">Aucun jeu. Cliquez sur <em>+ Ajouter un jeu</em>.</div>';
        return;
      }
      list.innerHTML = cfgState.editingGames.map((g, i) => {
        const btns = (Array.isArray(g.launchButton) ? g.launchButton : [g.launchButton]).map((b, j) => renderBtnEntry(i, j, b)).join("");
        return `<div class="game-entry" data-idx="${i}">
          <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
            <input class="ge-name" type="text" placeholder="Nom du jeu" value="${escapeHtml(g.name)}" style="flex:1" />
            <button class="btn-icon danger" data-del-game="${i}" title="Supprimer ce jeu">🗑️</button>
          </div>
          <div class="ge-buttons">${btns}</div>
          <button class="ge-add-btn-companion" data-add-btn="${i}">+ Ajouter un Companion</button>
        </div>`;
      }).join("");
    }

    function syncGamesFromDOM() {
      cfgState.editingGames = Array.from(document.querySelectorAll("#cfgGamesList .game-entry")).map(gameRow => ({
        name: gameRow.querySelector(".ge-name").value.trim(),
        launchButton: Array.from(gameRow.querySelectorAll(".ge-btn-entry")).map(btnRow => ({
          companionUrl: btnRow.querySelector(".ge-url").value.trim(),
          page:         parseInt(btnRow.querySelector(".ge-page").value)   || 0,
          row:          parseInt(btnRow.querySelector(".ge-rownum").value) || 0,
          column:       parseInt(btnRow.querySelector(".ge-col").value)    || 0
        }))
      }));
    }

    function openConfigModal(id = null) {
      cfgState.editingId = id;
      document.getElementById("cfgIdError").textContent    = "";
      document.getElementById("cfgRecVarError").textContent = "";
      document.getElementById("cfgError").textContent      = "";
      document.getElementById("cfgGamesError").textContent = "";
      document.getElementById("advancedSection").classList.remove("open");
      document.getElementById("advancedToggle").textContent = "▸ Variables contact Companion (avancé)";

      if (id) {
        const s = cfgState.studios.find(x => x.id === id);
        if (!s) return;
        document.getElementById("configModalTitle").textContent = "Modifier le studio";
        document.getElementById("cfgId").value    = s.id;
        document.getElementById("cfgId").disabled = true;
        document.getElementById("cfgLabel").value = s.label;
        document.getElementById("cfgRecVar").value = s.recVar;
        document.getElementById("cfgContactName").value  = s.contactVariables?.name  || "";
        document.getElementById("cfgContactPhone").value = s.contactVariables?.phone || "";
        document.getElementById("cfgContactEmail").value = s.contactVariables?.email || "";
        cfgState.editingGames = (s.games || []).map(g => ({
          name: g.name,
          launchButton: Array.isArray(g.launchButton)
            ? g.launchButton.map(b => ({ ...b }))
            : [{ companionUrl: '', ...(g.launchButton || { page: 2, row: 0, column: 0 }) }]
        }));
      } else {
        document.getElementById("configModalTitle").textContent = "Nouveau studio";
        document.getElementById("cfgId").disabled  = false;
        document.getElementById("cfgId").value     = "";
        document.getElementById("cfgLabel").value  = "";
        document.getElementById("cfgRecVar").value = "";
        document.getElementById("cfgContactName").value  = "";
        document.getElementById("cfgContactPhone").value = "";
        document.getElementById("cfgContactEmail").value = "";
        cfgState.editingGames = [{ name: "", launchButton: [{ companionUrl: "", page: 2, row: 0, column: 0 }] }];
      }

      renderCfgGames();
      document.getElementById("configOverlay").classList.add("open");
    }

    function closeConfigModal() {
      document.getElementById("configOverlay").classList.remove("open");
    }

    async function saveStudioFromModal() {
      const id     = document.getElementById("cfgId").value.trim().toUpperCase();
      const label  = document.getElementById("cfgLabel").value.trim();
      const recVar = document.getElementById("cfgRecVar").value.trim();

      // Validation
      let valid = true;
      document.getElementById("cfgIdError").textContent    = "";
      document.getElementById("cfgRecVarError").textContent = "";
      document.getElementById("cfgError").textContent      = "";
      document.getElementById("cfgGamesError").textContent = "";

      if (!id) {
        document.getElementById("cfgIdError").textContent = "ID requis";
        valid = false;
      } else if (!/^[A-Z0-9_]+$/.test(id)) {
        document.getElementById("cfgIdError").textContent = "Lettres majuscules, chiffres et _ uniquement";
        valid = false;
      } else if (!cfgState.editingId && cfgState.studios.find(s => s.id === id)) {
        document.getElementById("cfgIdError").textContent = "Cet ID existe déjà";
        valid = false;
      }

      if (!label) {
        document.getElementById("cfgError").textContent = "Label requis";
        valid = false;
      }

      if (!recVar) {
        document.getElementById("cfgRecVarError").textContent = "Variable REC requise";
        valid = false;
      }

      syncGamesFromDOM();
      const games = cfgState.editingGames.filter(g => g.name);
      if (!games.length) {
        document.getElementById("cfgGamesError").textContent = "Au moins un jeu requis";
        valid = false;
      }

      if (!valid) return;

      // Contact variables : auto-générées depuis l'ID si vides
      const contactName  = document.getElementById("cfgContactName").value.trim()  || `contact_${id}_name`;
      const contactPhone = document.getElementById("cfgContactPhone").value.trim() || `contact_${id}_phone`;
      const contactEmail = document.getElementById("cfgContactEmail").value.trim() || `contact_${id}_email`;

      const studio = {
        id, label, recVar,
        games,
        contactVariables: { name: contactName, phone: contactPhone, email: contactEmail }
      };

      if (cfgState.editingId) {
        const idx = cfgState.studios.findIndex(s => s.id === cfgState.editingId);
        if (idx !== -1) cfgState.studios[idx] = studio;
      } else {
        cfgState.studios.push(studio);
      }

      try {
        await saveConfig();
        closeConfigModal();
      } catch (e) {
        document.getElementById("cfgError").textContent = e.message || "Erreur de sauvegarde";
      }
    }

    // Gestion des jeux dans la modal config
    document.getElementById("cfgGamesList").addEventListener("click", e => {
      const delGame = e.target.closest("[data-del-game]");
      const delBtn  = e.target.closest("[data-del-btn]");
      const addBtn  = e.target.closest("[data-add-btn]");

      if (delGame) {
        syncGamesFromDOM();
        cfgState.editingGames.splice(parseInt(delGame.dataset.delGame), 1);
        renderCfgGames();
      } else if (delBtn) {
        syncGamesFromDOM();
        const gi = parseInt(delBtn.dataset.gameIdx);
        const bi = parseInt(delBtn.dataset.btnIdx);
        const btns = cfgState.editingGames[gi].launchButton;
        if (btns.length > 1) {
          btns.splice(bi, 1);
          renderCfgGames();
        }
      } else if (addBtn) {
        syncGamesFromDOM();
        const gi = parseInt(addBtn.dataset.addBtn);
        cfgState.editingGames[gi].launchButton.push({ companionUrl: "", page: 2, row: 0, column: 0 });
        renderCfgGames();
        // Focus le nouveau champ URL
        const gameRows = document.querySelectorAll("#cfgGamesList .game-entry");
        const newBtnEntry = gameRows[gi]?.querySelectorAll(".ge-btn-entry");
        if (newBtnEntry?.length) newBtnEntry[newBtnEntry.length - 1].querySelector(".ge-url").focus();
      }
    });

    document.getElementById("cfgAddGameBtn").addEventListener("click", () => {
      syncGamesFromDOM();
      cfgState.editingGames.push({ name: "", launchButton: [{ companionUrl: "", page: 2, row: 0, column: 0 }] });
      renderCfgGames();
      const entries = document.querySelectorAll("#cfgGamesList .game-entry");
      if (entries.length) entries[entries.length - 1].querySelector(".ge-name").focus();
    });

    // Auto-remplissage de la variable REC depuis l'ID
    document.getElementById("cfgId").addEventListener("input", e => {
      const id = e.target.value.trim().toUpperCase();
      e.target.value = id;
      if (!cfgState.editingId) {
        const recVar = document.getElementById("cfgRecVar");
        if (!recVar.value || recVar.value.startsWith("REC_")) {
          recVar.value = id ? `REC_${id}` : "";
        }
      }
    });

    // Toggle section avancée
    document.getElementById("advancedToggle").addEventListener("click", () => {
      const section = document.getElementById("advancedSection");
      const btn     = document.getElementById("advancedToggle");
      const open    = section.classList.toggle("open");
      btn.textContent = (open ? "▾ " : "▸ ") + "Variables contact Companion (avancé)";
    });

    /* ---- Companion URL ---- */
    document.getElementById("editCompanionBtn").addEventListener("click", () => {
      document.getElementById("companionEditRow").style.display = "flex";
      document.getElementById("companionUrlInput").focus();
      document.getElementById("companionPing").textContent = "";
      document.getElementById("companionPing").className   = "companion-ping";
    });

    document.getElementById("cancelCompanionBtn").addEventListener("click", () => {
      document.getElementById("companionEditRow").style.display = "none";
      document.getElementById("companionUrlInput").value = cfgState.companionUrl;
    });

    document.getElementById("saveCompanionBtn").addEventListener("click", async () => {
      const url   = document.getElementById("companionUrlInput").value.trim();
      const input = document.getElementById("companionUrlInput");
      if (!url) return;
      input.disabled = true;
      try {
        const res = await api("/api/admin/companion-url", {
          method: "POST",
          body:   JSON.stringify({ url })
        });
        cfgState.companionUrl = res.url;
        document.getElementById("companionUrlText").textContent  = res.url;
        document.getElementById("companionEditRow").style.display = "none";
      } catch (e) {
        input.style.borderColor = "var(--red)";
        setTimeout(() => { input.style.borderColor = ""; }, 1500);
      } finally {
        input.disabled = false;
      }
    });

    document.getElementById("companionUrlInput").addEventListener("keydown", e => {
      if (e.key === "Enter")  document.getElementById("saveCompanionBtn").click();
      if (e.key === "Escape") document.getElementById("cancelCompanionBtn").click();
    });

    document.getElementById("testCompanionBtn").addEventListener("click", async () => {
      const ping = document.getElementById("companionPing");
      ping.textContent = "…";
      ping.className   = "companion-ping";
      try {
        await api("/api/admin/companion-test");
        ping.textContent = "✓ Connecté";
        ping.className   = "companion-ping ok";
      } catch {
        ping.textContent = "✗ Hors ligne";
        ping.className   = "companion-ping ko";
      }
    });

    document.getElementById("addStudioBtn").addEventListener("click", () => openConfigModal());
    document.getElementById("configCancelBtn").addEventListener("click", closeConfigModal);
    document.getElementById("configOverlay").addEventListener("click", e => {
      if (e.target === document.getElementById("configOverlay")) closeConfigModal();
    });
    document.getElementById("configSaveBtn").addEventListener("click", saveStudioFromModal);

    /* ============================================================
       INIT
    ============================================================ */
    updateClock();
    setInterval(updateClock, 1000);

    checkLicense();

    setInterval(() => {
      if (els.appRoot.style.display !== "none") {
        const pilotageVisible = document.getElementById("tab-pilotage").style.display !== "none";
        if (pilotageVisible) loadStudios().catch(() => {});
      }
    }, 3000);
  </script>
</body>
</html>
